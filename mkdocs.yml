site_name: Agentic Control Plane
site_description: Control plane for composable, governed AI agents
repo_url: https://github.com/jaredgrabill/agentic-control-plane
edit_uri: ''

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

docs_dir: docs

# Versioned docs are published with `mike` on release (.github/workflows/docs-release.yml).
# The material theme reads the version list from the deployed site at runtime, so
# `mkdocs build --strict` needs no mike plugin and stays green in the docs CI job.
extra:
  version:
    provider: mike

# Internal sprint artifacts are built but intentionally kept out of the nav;
# without this, `--strict` would flag them as omitted pages.
not_in_nav: |
  notes/sprint-handoff-*.md

nav:
  - Home: index.md
  - Vision & Scope:
      - Vision: vision.md
      - Domains: domains.md
  - Architecture:
      - Overview: architecture/overview.md
      - Agent Lifecycle: architecture/agent-lifecycle.md
      - Messaging & Discovery: architecture/messaging-and-discovery.md
      - Orchestration: architecture/orchestration.md
      - Knowledge & RAG: architecture/knowledge-and-rag.md
      - Multi-Tenancy: architecture/multi-tenancy.md
      - Governance & Policy: architecture/governance-and-policy.md
      - Security: architecture/security.md
      - Threat Model: architecture/threat-model.md
      - Security Self-Assessment: architecture/security-self-assessment.md
      - Observability: architecture/observability.md
      - Evaluation: architecture/evaluation.md
