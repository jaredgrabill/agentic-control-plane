id: approval-test-agent
name: Approval Test Agent
owner: team-platform
description: >
  A minimal R2 write agent used only by the governed-approval E2E slice. Its
  gov.test_write capability is risk R2, so a delegation to it lifts to
  require-approval at the orchestrator gate; the handler is canned (no real
  side effect) because this slice exercises the approval machinery, not a tool
  write. gov.test_undo is its declared compensator (compensation itself is
  item 2).
capabilities:
  - name: gov.test_write
    description: >
      A governed write used to exercise the require-approval gate. Applies a
      canned change to a target record and returns a citation-bearing summary.
    risk: R2
    compensator: gov.test_undo
    input_schema:
      type: object
      additionalProperties: true
      properties:
        text: { type: string }
        target: { type: string }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: { target: record-1 }
        description: apply a governed write to record-1
      - input: { target: record-2 }
        description: apply a governed write to record-2
      - input: { target: record-3 }
        description: apply a governed write to record-3
  - name: gov.test_undo
    description: >
      Compensator for gov.test_write — reverses the governed write. Its own
      compensator is gov.test_write (a mutual pair), which exercises the item-2
      registration rules (dangling/self/contradiction/risk all pass). Invoked
      by the compensation machinery during a saga unwind.
    risk: R2
    compensator: gov.test_write
    input_schema:
      type: object
      additionalProperties: true
      properties:
        target: { type: string }
        original: { type: object }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: { target: record-1 }
        description: undo the governed write to record-1
      - input: { target: record-2 }
        description: undo the governed write to record-2
      - input: { target: record-3 }
        description: undo the governed write to record-3
  - name: gov.test_fail
    description: >
      An R0 capability that always fails permanently — used by the compensation
      E2E slice to trigger an unwind of the preceding gov.test_write.
    risk: R0
    input_schema:
      type: object
      additionalProperties: true
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: {}
        description: always fails
      - input: { note: a }
        description: always fails
      - input: { note: b }
        description: always fails
  - name: gov.test_slow_fail
    description: >
      An R0 capability that sleeps (default ~6s, overridable via input.sleep_ms)
      then fails permanently. The kill-switch-audit E2E slice uses the sleep as a
      window to activate a risk-class kill switch AFTER the preceding R2 write has
      completed but BEFORE this step fails, so the ensuing saga unwind runs a
      compensator under an active R2 flag (exemption matrix).
    risk: R0
    input_schema:
      type: object
      additionalProperties: true
      properties:
        sleep_ms: { type: number }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: {}
        description: sleep then fail
      - input: { sleep_ms: 6000 }
        description: sleep 6s then fail
      - input: { sleep_ms: 3000 }
        description: sleep 3s then fail
