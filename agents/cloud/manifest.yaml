id: cloud-agent
name: Cloud Estate Agent
owner: team-platform
description: >
  Read-only visibility into the acme cloud estate: inventory search over the
  governed snapshot and week-over-week cost analysis against the billing
  export, with citations carrying document version and lineage. Answers are
  deterministic and extractive in v0 — no model calls.
capabilities:
  - name: cloud.inventory_query
    description: >
      Search the cloud inventory snapshot by service, environment, resource
      type, or region. At least one filter is required; results sort by
      monthly cost.
    risk: R0
    input_schema:
      type: object
      additionalProperties: false
      anyOf:
        - required: [service]
        - required: [env]
        - required: [resource_type]
        - required: [region]
      properties:
        service: { type: string, minLength: 1 }
        env: { type: string, enum: [prod, staging, dev] }
        resource_type: { type: string, minLength: 1 }
        region: { type: string, minLength: 1 }
        limit: { type: integer, minimum: 1, maximum: 50 }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: { service: payments-api, env: prod }
      - input: { resource_type: rds.instance }
      - input: { env: prod, region: us-east-1, limit: 10 }
  - name: cloud.cost_analysis
    description: >
      Week-over-week spend deltas from the governed cost report. Without a
      service it analyses total spend and attributes any spike over the
      threshold to the inventory changes behind it.
    risk: R0
    input_schema:
      type: object
      additionalProperties: false
      properties:
        service: { type: string, minLength: 1 }
        period:
          type: object
          required: [start, end]
          additionalProperties: false
          properties:
            start: { type: string, format: date }
            end: { type: string, format: date }
        threshold_pct: { type: number, minimum: 1, maximum: 100 }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: {}
      - input: { service: checkout-web }
      - input:
          service: payments-api
          period: { start: '2026-06-08', end: '2026-07-05' }
          threshold_pct: 25
  - name: cloud.tag_apply
    description: >
      Set tags on an inventory resource. A production-affecting write (R2):
      gated on human approval, and reversible by its compensator
      cloud.tag_restore, which restores the previous tag values this call
      records.
    risk: R2
    compensator: cloud.tag_restore
    input_schema:
      type: object
      additionalProperties: false
      required: [resource_id, tags]
      properties:
        resource_id: { type: string, minLength: 1 }
        tags:
          type: object
          minProperties: 1
          maxProperties: 10
          additionalProperties: { type: string }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
        resource_id: { type: string }
        applied: { type: object }
        previous: { type: object }
    examples:
      - input: { resource_id: i-0a1f001, tags: { owner: team-payments } }
      - input: { resource_id: i-0a1f001, tags: { cost_center: cc-42, owner: team-payments } }
      - input: { resource_id: i-0b7e101, tags: { review: pending } }
  - name: cloud.tag_restore
    description: >
      Restore the prior tag state of an inventory resource from a previous-value
      map: re-apply keys that had a value, remove keys that were absent. The
      declared compensator of cloud.tag_apply (mutual pair) — the honest inverse
      that restores previous values rather than blindly deleting.
    risk: R2
    compensator: cloud.tag_apply
    input_schema:
      type: object
      additionalProperties: false
      properties:
        resource_id: { type: string, minLength: 1 }
        previous: { type: object }
        original:
          type: object
          properties:
            step_id: { type: string }
            capability: { type: string }
            input: { type: object }
            output: { type: object }
    output_schema:
      type: object
      required: [text, citations, confidence]
      additionalProperties: false
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
        resource_id: { type: string }
    examples:
      - input: { resource_id: i-0a1f001, previous: { owner: platform-oncall } }
      - input: { resource_id: i-0a1f001, previous: { added: null, owner: platform-oncall } }
      - input:
          original:
            capability: cloud.tag_apply
            output: { resource_id: i-0a1f001, previous: { owner: platform-oncall } }
tools:
  - server: cloud-estate
    scopes: [cloud:inventory:read, cloud:cost:read, cloud:tag:write]
models:
  allowed: [default-tier]
data_classification: internal
sla:
  p95_latency_s: 30
  quality_slo: 0.9
