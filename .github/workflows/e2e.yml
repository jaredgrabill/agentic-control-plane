name: e2e

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  # The exit scenario also gates PRs that touch the control path.
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'agents/**'
      - 'python/**'
      - 'policies/**'
      - 'deploy/**'
      - 'tests/e2e/**'
      - 'fixtures/**'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exit-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - name: dev stack
        run: make dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: uv sync --locked
        working-directory: python
      # The full E2E suite MINUS the heavy DoD acceptance-scenario files
      # (scenario-*.test.ts) — those each boot the full multi-agent platform and
      # run nightly in the scenario-evals job below, off the PR path. This job
      # stays the authoritative full-suite gate for every other control-path file
      # (incl. exit-scenario.test.ts = DoD scenario 5).
      - name: phase 1 exit scenario + full control-path suite
        run: pnpm --filter @acp/e2e exec vitest run --exclude '**/scenario-*.test.ts'
      - name: dev stack logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs --tail 100

  # Standing nightly gate: the five DoD acceptance scenarios as E2E evals. Each
  # file boots the full multi-agent platform (heavy), so this runs on schedule +
  # workflow_dispatch only — never on the PR path. A red run here blocks 1.0.
  scenario-evals:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - name: dev stack
        run: make dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: uv sync --locked
        working-directory: python
      - name: dod acceptance scenarios
        run: pnpm --filter @acp/e2e exec vitest run scenario-
      - name: dev stack logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs --tail 100
