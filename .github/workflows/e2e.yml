name: e2e

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  # The exit scenario also gates PRs that touch the control path.
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'python/**'
      - 'policies/**'
      - 'deploy/**'
      - 'tests/e2e/**'
      - 'fixtures/**'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exit-scenario:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6.4.3
        with:
          enable-cache: true
      - name: dev stack
        run: make dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: uv sync --locked
        working-directory: python
      - name: phase 1 exit scenario
        run: pnpm --filter @acp/e2e run test:e2e
      - name: dev stack logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs --tail 100
