name: docs-release

# Publishes versioned documentation with `mike` when a release tag is pushed.
# The version selector on the site is driven by the `versions.json` mike writes
# to the gh-pages branch; the regular `docs` CI job keeps building the tip with
# `mkdocs build --strict` on every PR.
#
# HUMAN DEP: GitHub Pages must be enabled for this repo with the source set to
# the `gh-pages` branch (Settings → Pages). Until then this workflow pushes the
# branch but the site is not served.

on:
  push:
    tags:
      # Protocol/SDK release tags cut by release-please, e.g. protocol-v1.0.0.
      - '*-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  deploy-versioned-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
      - name: configure git identity for the gh-pages commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # Derive a docs version (major.minor) from the pushed tag, e.g.
      # protocol-v1.0.0 → 1.0. Patch releases refresh the same docs version.
      - name: derive docs version
        id: ver
        run: |
          raw="${GITHUB_REF_NAME##*-v}"
          echo "version=${raw%.*}" >> "$GITHUB_OUTPUT"
      - name: mike deploy (push versioned docs, alias latest)
        run: |
          uvx --with mkdocs-material --with mike \
            mike deploy --push --update-aliases "${{ steps.ver.outputs.version }}" latest
          uvx --with mkdocs-material --with mike mike set-default --push latest
