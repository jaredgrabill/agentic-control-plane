name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6.4.3
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy .
      # Coverage floor per testing.md; the floor may rise, never fall.
      - run: uv run pytest --cov --cov-fail-under=85

  contracts:
    name: cross-language contracts stay generated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6.4.3
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --locked
        working-directory: python
      - run: pnpm gen
      - name: generated bindings match schemas
        run: |
          git diff --exit-code || {
            echo '::error::Schema changed without regenerated bindings. Run `pnpm gen` and commit both language outputs in the same PR.'
            exit 1
          }

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
          else
            npx commitlint --last
          fi

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6.4.3
      - run: uvx --with mkdocs-material mkdocs build --strict

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4.1.0
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v6.4.3
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - name: pip-audit
        working-directory: python
        run: |
          uv export --no-emit-workspace --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit --strict -r /tmp/requirements.txt
