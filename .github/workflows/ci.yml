name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      # Build first: the type-aware lint rules and typecheck resolve
      # workspace dependencies from their built dist types.
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      # Coverage floor per testing.md; the floor may rise, never fall.
      - run: uv run pytest --cov --cov-fail-under=85

  contracts:
    name: cross-language contracts stay generated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --locked
        working-directory: python
      - run: pnpm gen
      - name: generated bindings match schemas
        run: |
          git diff --exit-code || {
            echo '::error::Schema changed without regenerated bindings. Run `pnpm gen` and commit both language outputs in the same PR.'
            exit 1
          }

  parity:
    name: sdk parity (typescript vs python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --locked
        working-directory: python
      - run: pnpm --filter @acp/parity-harness... build
      - name: typescript harness report
        run: node tests/parity/dist/main.js run --fixtures fixtures/parity --out "$RUNNER_TEMP/report-ts.json"
      - name: python harness report
        run: uv run python parity/runner.py --fixtures ../fixtures/parity --out "$RUNNER_TEMP/report-py.json"
        working-directory: python
      # Same goldens, same verdicts: the two SDKs must agree case by case.
      - name: compare reports
        run: node tests/parity/dist/main.js compare "$RUNNER_TEMP/report-ts.json" "$RUNNER_TEMP/report-py.json"

  evals:
    name: eval gate (golden suites vs committed baselines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: uv sync --locked
        working-directory: python
      # The gate CLI plus every TS roster agent's report emitter (the
      # knowledge agent's emitter rides the uv sync above).
      - run: pnpm --filter @acp/evaluation... --filter @acp/cloud-agent... --filter @acp/code-agent... --filter @acp/change-agent... --filter @acp/netsec-agent... build
      # Positive control: every roster agent's suite runs hermetically and
      # must land within tolerance of its committed baseline.
      - name: golden suites within tolerance of baselines
        run: node apps/evaluation/dist/main.js run --manifest apps/evaluation/agents.json
      # Regression proof: the gate itself is gated. A report regressed below
      # baseline − tolerance MUST be rejected with exactly exit 1 AND the
      # expected violation on stderr — exit 0 means the gate accepted a
      # regression, exit 2 means it crashed (usage error, bad path) without
      # ever gating anything. Either way this job fails.
      - name: the gate rejects a regressed report
        run: |
          set +e
          output="$(node apps/evaluation/dist/main.js gate --report apps/evaluation/fixtures/regressed/report.json --baseline apps/evaluation/fixtures/regressed/baseline.json 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 1 ]; then
            echo "::error::expected the gate to reject the regressed report with exit 1, got exit $status"
            exit 1
          fi
          # Match a stable ASCII prefix of the violation line (its full text
          # separates baseline and tolerance with U+2212, awkward for grep).
          if ! printf '%s\n' "$output" | grep -F 'pass_rate 0.7143 < baseline 1.0000' >/dev/null; then
            echo '::error::the gate exited 1 without reporting the expected pass_rate violation'
            exit 1
          fi

  api-freeze:
    name: protocol + sdk api freeze (semver gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so the schema-diff can reach the base branch's baseline
          # (PRs) or the previous commit's baseline (pushes to main).
          fetch-depth: 0
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # The API report is extracted from the built .d.ts rollups.
      - run: pnpm --filter @acp/agent-sdk... --filter @acp/tool-client... --filter @acp/llm-client... build
      # 1. The frozen wire contract may not regress. The diff runs the LIVE
      # schema surface against the MERGE-BASE baseline — the base branch's
      # committed schema-baseline.json (PRs) or the previous commit's (pushes) —
      # NOT the PR's own committed baseline. Diffing against the PR's baseline is
      # self-referential: the no-drift test forces baseline == current, so a PR
      # that regenerates the baseline for its schema change would show zero
      # findings and slip past the label gate. Against the merge-base baseline a
      # breaking change surfaces and fails unless the PR carries the `breaking`
      # label (a deliberate major bump). A no-change PR is identical to the base
      # baseline → zero findings → passes.
      - name: protocol schema-diff (breaking changes need the 'breaking' label)
        env:
          ACP_ALLOW_BREAKING: ${{ contains(github.event.pull_request.labels.*.name, 'breaking') && '1' || '0' }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          baseline_path='packages/protocol/schema-baseline.json'
          out="$RUNNER_TEMP/merge-base-baseline.json"
          if [ -n "$BASE_REF" ]; then
            # Pull request: compare against the base branch's frozen contract.
            git fetch --no-tags --depth=1 origin "$BASE_REF"
            git show "origin/$BASE_REF:$baseline_path" > "$out"
            node scripts/schema-diff.mjs --baseline "$out"
          elif git cat-file -e "HEAD~1:$baseline_path" 2>/dev/null; then
            # Push (e.g. to main): compare against the previous commit's baseline.
            git show "HEAD~1:$baseline_path" > "$out"
            node scripts/schema-diff.mjs --baseline "$out"
          else
            # No parent baseline to diff against (initial commit); nothing to gate.
            echo 'schema-diff: no previous baseline to compare against; skipping.'
          fi
      # 2. Self-test: the gate itself is gated. A deliberately-breaking fixture
      # MUST be rejected with exactly exit 1 AND the expected violation on
      # stderr — exit 0 means the gate accepted a regression, exit 2 means it
      # crashed without ever gating. Mirrors the evals-job self-test.
      - name: the gate rejects a breaking schema change
        run: |
          set +e
          output="$(node scripts/schema-diff.mjs \
            --baseline packages/protocol/tests/fixtures/schema-diff/baseline.json \
            --current packages/protocol/tests/fixtures/schema-diff/breaking.json 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 1 ]; then
            echo "::error::expected schema-diff to reject the breaking fixture with exit 1, got exit $status"
            exit 1
          fi
          if ! printf '%s\n' "$output" | grep -F 'enum value removed' >/dev/null; then
            echo '::error::schema-diff exited 1 without reporting the expected enum-removal violation'
            exit 1
          fi
      # 3. The committed SDK API reports must match the built export surface.
      - name: sdk api reports match the built surface
        run: |
          node scripts/api-report.mjs --check || {
            echo '::error::SDK public API changed without an updated report. Run `pnpm api:report` and commit the etc/*.api.md changes in the same PR.'
            exit 1
          }

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: lint commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
          else
            npx commitlint --last
          fi

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
      - run: uvx --with mkdocs-material mkdocs build --strict

  helm-lint:
    name: helm chart lints and renders valid kubernetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Self-contained install (pinned versions) so the gate needs no third-party
      # action. The chart declares NO active subchart dependencies, so lint and
      # template render fully offline — no `helm dependency update`, no cluster.
      - name: install helm + kubeconform
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar -xz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar -xz
          sudo mv kubeconform /usr/local/bin/kubeconform
          helm version --short && kubeconform -v
      - name: helm lint (default + dev values)
        run: |
          helm lint deploy/helm/acp
          helm lint deploy/helm/acp --values deploy/helm/acp/values-dev.yaml
      # Render both value sets and validate every manifest against the Kubernetes
      # API schemas. -ignore-missing-schemas tolerates any CRDs (e.g. an
      # ExternalSecret) while still strictly validating core resources.
      - name: helm template | kubeconform
        run: |
          helm template acp deploy/helm/acp \
            | kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.30.0
          helm template acp deploy/helm/acp --values deploy/helm/acp/values-dev.yaml \
            | kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.30.0

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - name: pip-audit
        working-directory: python
        run: |
          uv export --no-emit-workspace --format requirements-txt > /tmp/requirements.txt
          uvx pip-audit --strict -r /tmp/requirements.txt
