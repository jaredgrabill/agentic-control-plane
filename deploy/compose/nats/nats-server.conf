# Dev-stack NATS: accounts as the isolation boundary, per-service users,
# subject permissions that make the platform invariants physical — the agent
# user has no permission that reaches another agent or a platform-internal
# subject. Auth callout (platform JWT → session-scoped bus identity) replaces
# static tenant users in the hardened profile; these credentials exist only
# for the local dev stack and are overridable via environment.

port: 4222
http_port: 8222
server_name: acp-dev-nats

jetstream {
  store_dir: /data/jetstream
}

accounts {
  SYS: {
    users: [{ user: sys, password: $ACP_NATS_SYS_PASSWORD }]
  }

  PLATFORM: {
    jetstream: enabled
    users: [
      { user: gateway, password: $ACP_NATS_GATEWAY_PASSWORD },
      { user: orchestrator, password: $ACP_NATS_ORCHESTRATOR_PASSWORD },
      { user: registry, password: $ACP_NATS_REGISTRY_PASSWORD },
      { user: policy, password: $ACP_NATS_POLICY_PASSWORD },
      { user: audit, password: $ACP_NATS_AUDIT_PASSWORD },
      { user: knowledge, password: $ACP_NATS_KNOWLEDGE_PASSWORD },
      { user: token, password: $ACP_NATS_TOKEN_PASSWORD }
    ]
    exports: [
      # Control-plane RPC surface consumed by tenant-side workers (e.g. the
      # SDK Retriever). Fine-grained authorization happens in the service
      # against the delegated JWT — bus permissions stay coarse.
      { service: "acp.platform.svc.>" },
      # Registry announcements and control flags (kill switch): read-only
      # fan-out to every tenant.
      { stream: "acp.platform.registry.>" },
      { stream: "acp.platform.control.>" }
    ]
    imports: [
      # Tenant events (audit, task, telemetry) flow into the platform
      # account, where the JetStream audit/task streams capture them.
      { stream: { account: TENANT_ACME, subject: "acp.acme.>" } }
    ]
  }

  TENANT_ACME: {
    users: [
      {
        user: agent-knowledge
        password: $ACP_NATS_AGENT_KNOWLEDGE_PASSWORD
        permissions {
          publish: [
            "acp.acme.audit.>",
            "acp.acme.telemetry.>",
            "acp.platform.svc.knowledge.>",
            "_INBOX.>"
          ]
          subscribe: [
            "acp.acme.agent.knowledge-agent.>",
            "acp.platform.registry.>",
            "acp.platform.control.>",
            "_INBOX.>"
          ]
        }
      }
    ]
    exports: [{ stream: "acp.acme.>" }]
    imports: [
      { service: { account: PLATFORM, subject: "acp.platform.svc.>" } },
      { stream: { account: PLATFORM, subject: "acp.platform.registry.>" } },
      { stream: { account: PLATFORM, subject: "acp.platform.control.>" } }
    ]
  }
}

system_account: SYS
