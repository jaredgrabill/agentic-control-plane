# Dev-stack NATS: accounts as the isolation boundary. Platform services use
# static per-service users (fixed infra); ALL other connections — every
# tenant agent — go through the auth callout (item 0c), which mints a
# session-scoped bus identity from the agent's platform JWT (aud acp:bus,
# ≤15min). There is no static path into a tenant account any more. The dev
# issuer/xkey seeds live in the token service env (run-platform.mjs); a
# hardened deployment vaults fresh seeds and moves to SPIFFE/mTLS.
#
# Conf change ⇒ recreate the container: `docker compose -p acp-dev up -d`.

port: 4222
http_port: 8222
server_name: acp-dev-nats

jetstream {
  store_dir: /data/jetstream
}

authorization {
  # Refuse a connection whose callout does not answer in time (fail closed).
  timeout: 3
  auth_callout {
    # Issuer account nkey (public) that signs minted user JWTs + auth
    # responses; the token service holds the seed (ACP_NATS_AUTH_ISSUER_SEED).
    issuer: "AAYJB5HORUGT6QGG5ZIKUHFIGYDJLJUEPG3AGAXGSIGR2MP3NSA6WP5W"
    # The account the callout responder (token service) connects under.
    account: PLATFORM
    # Static platform users bypass the callout (fixed infra); every other
    # connection is routed through it. Keep in lockstep with the PLATFORM
    # users below.
    auth_users: [
      gateway, orchestrator, registry, policy, audit,
      knowledge, token, tool-gateway, llm-gateway, evaluation
    ]
    # Server seals auth requests to this responder curve key (its seed is
    # ACP_NATS_AUTH_XKEY_SEED); connect credentials never travel in clear.
    xkey: "XBAZR54YJK3FJBWTQ6YW5J4YHOS57XK6MYVJQP7DZG5YNXIDTFYVYJPK"
  }
}

# Accounts (the tenant isolation boundary) are GENERATED from the tenant
# registry (deploy/dev/tenants.json) by scripts/gen-nats-accounts.mjs, which
# validates the isolation invariants (exact per-tenant exports/imports,
# tenant→account bijection) and fails on any widening. Onboarding a tenant =
# edit the registry (scripts/onboard-tenant.mjs), regenerate, recreate.
include ./nats-accounts.gen.conf

system_account: SYS
