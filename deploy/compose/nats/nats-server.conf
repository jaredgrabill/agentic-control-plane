# Dev-stack NATS: accounts as the isolation boundary. Platform services use
# static per-service users (fixed infra); ALL other connections — every
# tenant agent — go through the auth callout (item 0c), which mints a
# session-scoped bus identity from the agent's platform JWT (aud acp:bus,
# ≤15min). There is no static path into a tenant account any more. The dev
# issuer/xkey seeds live in the token service env (run-platform.mjs); a
# hardened deployment vaults fresh seeds and moves to SPIFFE/mTLS.
#
# Conf change ⇒ recreate the container: `docker compose -p acp-dev up -d`.

port: 4222
http_port: 8222
server_name: acp-dev-nats

jetstream {
  store_dir: /data/jetstream
}

authorization {
  # Refuse a connection whose callout does not answer in time (fail closed).
  timeout: 3
  auth_callout {
    # Issuer account nkey (public) that signs minted user JWTs + auth
    # responses; the token service holds the seed (ACP_NATS_AUTH_ISSUER_SEED).
    issuer: "AAYJB5HORUGT6QGG5ZIKUHFIGYDJLJUEPG3AGAXGSIGR2MP3NSA6WP5W"
    # The account the callout responder (token service) connects under.
    account: PLATFORM
    # Static platform users bypass the callout (fixed infra); every other
    # connection is routed through it. Keep in lockstep with the PLATFORM
    # users below.
    auth_users: [
      gateway, orchestrator, registry, policy, audit,
      knowledge, token, tool-gateway, llm-gateway, evaluation
    ]
    # Server seals auth requests to this responder curve key (its seed is
    # ACP_NATS_AUTH_XKEY_SEED); connect credentials never travel in clear.
    xkey: "XBAZR54YJK3FJBWTQ6YW5J4YHOS57XK6MYVJQP7DZG5YNXIDTFYVYJPK"
  }
}

accounts {
  SYS: {
    users: [{ user: sys, password: $ACP_NATS_SYS_PASSWORD }]
  }

  PLATFORM: {
    jetstream: enabled
    users: [
      { user: gateway, password: $ACP_NATS_GATEWAY_PASSWORD },
      { user: orchestrator, password: $ACP_NATS_ORCHESTRATOR_PASSWORD },
      { user: registry, password: $ACP_NATS_REGISTRY_PASSWORD },
      { user: policy, password: $ACP_NATS_POLICY_PASSWORD },
      { user: audit, password: $ACP_NATS_AUDIT_PASSWORD },
      { user: knowledge, password: $ACP_NATS_KNOWLEDGE_PASSWORD },
      { user: token, password: $ACP_NATS_TOKEN_PASSWORD },
      { user: tool-gateway, password: $ACP_NATS_TOOL_GATEWAY_PASSWORD },
      { user: llm-gateway, password: $ACP_NATS_LLM_GATEWAY_PASSWORD },
      { user: evaluation, password: $ACP_NATS_EVALUATION_PASSWORD }
    ]
    exports: [
      # Control-plane RPC surface consumed by tenant-side workers (e.g. the
      # SDK Retriever). Fine-grained authorization happens in the service
      # against the delegated JWT — bus permissions stay coarse.
      { service: "acp.platform.svc.>" },
      # Registry announcements and control flags (kill switch): read-only
      # fan-out to every tenant.
      { stream: "acp.platform.registry.>" },
      { stream: "acp.platform.control.>" }
    ]
    imports: [
      # Tenant events (audit, task, telemetry) flow into the platform
      # account, where the JetStream audit/task streams capture them.
      { stream: { account: TENANT_ACME, subject: "acp.acme.>" } }
    ]
  }

  TENANT_ACME: {
    # No static users: tenant agents get session identities from the auth
    # callout (aud of the minted user JWT places them in this account). The
    # callout applies the exact publish/subscribe template the old
    # agent-knowledge user had, parameterized per agent — see
    # apps/token/src/bus-auth/core.ts.
    exports: [{ stream: "acp.acme.>" }]
    imports: [
      { service: { account: PLATFORM, subject: "acp.platform.svc.>" } },
      { stream: { account: PLATFORM, subject: "acp.platform.registry.>" } },
      { stream: { account: PLATFORM, subject: "acp.platform.control.>" } }
    ]
  }
}

system_account: SYS
