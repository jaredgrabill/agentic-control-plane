receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  debug:
    verbosity: basic
  # Prometheus scrape endpoint for the SLO dashboards. Exposes all OTLP
  # metrics on :8889/metrics; the observability overlay's Prometheus scrapes
  # it (deploy/compose/observability/docker-compose.observability.yml).
  prometheus:
    endpoint: 0.0.0.0:8889
    # Keep gen_ai.* / acp.* attributes as labels so SLO rules can group by
    # tenant, agent_version, capability, etc.
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
