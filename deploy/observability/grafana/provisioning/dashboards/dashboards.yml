apiVersion: 1

providers:
  - name: acp-slo
    orgId: 1
    folder: ACP
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Mounted from deploy/observability/dashboards in the overlay compose.
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
