{{- /*
Dev-only Secrets. OFF by default (devSecrets.create=false): production supplies
the credentials / token-clients / datastore Secrets out-of-band (Vault,
ExternalSecrets), honoring the no-static-credentials posture. This template
exists so `helm install -f values-dev.yaml` yields a self-contained dev render.

For a faithful dev deploy, pass the committed dev client table:
  --set devSecrets.create=true \
  --set-file devSecrets.tokenClients=deploy/dev/token-clients.json
*/ -}}
{{- if .Values.devSecrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acp.credentialsSecret" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml .Values.devSecrets.credentials | nindent 2 }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acp.datastoreSecret" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.database.secretKey }}: {{ .Values.devSecrets.databaseUrl | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acp.tokenClientsSecret" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
type: Opaque
stringData:
  token-clients.json: {{ .Values.devSecrets.tokenClients | quote }}
{{- end }}
