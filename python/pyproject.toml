# uv workspace root (virtual — not itself a published package).
# All Python packages live under this directory; one lockfile for the workspace.
[tool.uv.workspace]
members = ["acp-protocol", "acp-agent-sdk", "acp-create-agent", "agents/knowledge"]

[dependency-groups]
dev = [
    "ruff>=0.12",
    "mypy>=1.16",
    "pytest>=8.4",
    "pytest-cov>=6.2",
    "pytest-asyncio>=1.0",
    "datamodel-code-generator[http]>=0.31",
    "types-jsonschema>=4.23",
    "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["**/generated/**"]

[tool.ruff.lint]
select = [
    "E", "W",    # pycodestyle
    "F",         # pyflakes
    "I",         # isort
    "B",         # bugbear
    "UP",        # pyupgrade
    "S",         # bandit
    "ASYNC",     # async pitfalls
    "RUF",
]
[tool.ruff.lint.per-file-ignores]
# Asserts are the point of tests; fake credentials and fake transports are
# how the SDK seams get exercised without infrastructure.
"**/tests/**" = ["S101", "S105", "S106", "ASYNC109", "RUF043"]
"**/generated/**" = ["E501", "UP"]
# The template embeds rendered file bodies; their line lengths belong to
# the scaffolded project, not this file.
"**/acp_create_agent/template.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
# src-layout: module names resolve from each package's src/ base. parity/
# holds plain scripts (run with sys.path[0] = parity/), so it is its own base.
explicit_package_bases = true
mypy_path = ["acp-protocol/src", "acp-agent-sdk/src", "acp-create-agent/src", "parity"]
# Strict on src/ per coding-standards; each package's tests import as a
# same-named `tests` module, which mypy cannot disambiguate in one run.
files = [
    "acp-protocol/src",
    "acp-agent-sdk/src",
    "acp-create-agent/src",
    "acp-protocol/tests",
    "parity",
]
# Generated pydantic models are checked, but line-length/style oddities in
# codegen output must not fail the human-code gate.
[[tool.mypy.overrides]]
module = "*.generated.*"
disallow_any_explicit = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
addopts = "-q --import-mode=importlib"

[tool.coverage.run]
source = [
    "acp-protocol/src",
    "acp-agent-sdk/src",
    "acp-create-agent/src",
]
# The worker/bus runtime needs live Temporal + NATS and is exercised by the
# E2E suite against the dev stack; decision logic is unit-covered.
omit = ["**/generated/*"]
