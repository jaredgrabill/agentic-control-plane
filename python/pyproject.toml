# uv workspace root (virtual — not itself a published package).
# All Python packages live under this directory; one lockfile for the workspace.
[tool.uv.workspace]
members = ["acp-protocol"]

[dependency-groups]
dev = [
    "ruff>=0.12",
    "mypy>=1.16",
    "pytest>=8.4",
    "pytest-cov>=6.2",
    "pytest-asyncio>=1.0",
    "datamodel-code-generator[http]>=0.31",
    "types-jsonschema>=4.23",
]

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["**/generated/**"]

[tool.ruff.lint]
select = [
    "E", "W",    # pycodestyle
    "F",         # pyflakes
    "I",         # isort
    "B",         # bugbear
    "UP",        # pyupgrade
    "S",         # bandit
    "ASYNC",     # async pitfalls
    "RUF",
]
[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S101"]  # assert is the point of tests
"**/generated/**" = ["E501", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unreachable = true
# Generated pydantic models are checked, but line-length/style oddities in
# codegen output must not fail the human-code gate.
[[tool.mypy.overrides]]
module = "*.generated.*"
disallow_any_explicit = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["."]
addopts = "-q"
