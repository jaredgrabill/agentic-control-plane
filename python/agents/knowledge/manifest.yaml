id: knowledge-agent
name: Knowledge & Policy Agent
owner: team-platform
description: >
  Authoritative retrieval and interpretation of organizational knowledge —
  policies, standards, runbooks — with citations carrying document version
  and effective date. Answers below the confidence floor abstain rather
  than guess.
capabilities:
  - name: knowledge.search
    description: Hybrid search over the governed corpus; returns passages with citations.
    risk: R0
    input_schema:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }
        k: { type: integer, minimum: 1, maximum: 50 }
    output_schema:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items:
            type: object
            required: [content, citation]
            properties:
              content: { type: string }
              score: { type: number }
              citation: { type: object }
    examples:
      - input: { query: "change freeze policy" }
      - input: { query: "payments incident runbook" }
      - input: { query: "TLS configuration standard", k: 5 }
  - name: knowledge.answer_with_citations
    description: >
      Synthesized answer grounded in retrieved passages; every factual
      claim cites its chunk. Abstains below the confidence floor.
    risk: R0
    input_schema:
      type: object
      required: [question]
      properties:
        question: { type: string, minLength: 1 }
    output_schema:
      type: object
      required: [text, citations, confidence]
      properties:
        text: { type: string }
        citations: { type: array }
        confidence: { type: number }
        abstained: { type: boolean }
    examples:
      - input: { question: "What does our policy say about change freezes?" }
      - input: { question: "Who must approve emergency changes during a freeze?" }
      - input: { question: "How long are change records retained?" }
tools:
  - server: knowledge-store
    scopes: [knowledge:search:read]
models:
  allowed: [default-tier]
data_classification: internal
sla:
  p95_latency_s: 30
  quality_slo: 0.9
